# Use this with legacy docker-compose (v1) which does not support build.ssh.
# Build the image first: DOCKER_BUILDKIT=1 docker build -t arm_api2_img:jazzy --target add_gui --build-arg LLM_BACKEND=ollama --ssh default .
# Then: docker-compose -f compose.dash_ollama.image-only.yml up -d

services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    command: ["sh", "-c", "ollama pull llava && exec ollama serve"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  arm_api:
    image: arm_api2_img:jazzy
    container_name: arm_api2_cont
    network_mode: "host"
    privileged: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - /dev:/dev
      - /tmp/.x11-unix:/tmp/.x11-unix
      - ${SSH_AUTH_SOCK}:/ssh-agent
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
      - DISPLAY=${DISPLAY}
      - TERM=xterm-256color
    working_dir: /root
    command: tmuxinator start robot_workspace
    stdin_open: true
    tty: true

volumes:
  ollama:
